<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Security Alert</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #00ff00;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .box {
        text-align: center;
        border: 2px solid #00ff00;
        padding: 40px;
        box-shadow: 0 0 20px #00ff00;
    }
    h1 {
        font-size: 28px;
        animation: flicker 1.5s infinite;
    }
    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }
    p {
        margin-top: 20px;
        color: #0f0;
    }
</style>
</head>
<body>
    <div class="box">
        <h1>⚠ SECURITY WARNING ⚠</h1>
        <p>МІНЯЙ ПАРОЛЬ НА ТЕЛЕГРАМІ БО Я МАЮ ДОСТУП ДО ТВОЇX ЧАТІВ СУЧКА</p>
        <p>(я не думав що ти таке дивишся)</p>
        <p>ЦЕ Я ДЖЕФФРІ ЕПШТЕЙН <span id="time"></span></p>
    </div>

<script>
    function updateTime() {
        let now = new Date();
        now.setMinutes(now.getMinutes() - 5); // мінус 5 хвилин

        let day = String(now.getDate()).padStart(2, '0');
        let month = String(now.getMonth() + 1).padStart(2, '0');
        let year = now.getFullYear();

        let hours = String(now.getHours()).padStart(2, '0');
        let minutes = String(now.getMinutes()).padStart(2, '0');

        let formatted = `${day}.${month}.${year} ${hours}:${minutes}`;

        document.getElementById("time").textContent = " | " + formatted;
    }

    updateTime();
    setInterval(updateTime, 1000);
</script>

</body>
</html>
