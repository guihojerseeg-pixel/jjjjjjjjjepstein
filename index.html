<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Security Alert</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #00ff00;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .box {
        text-align: center;
        border: 2px solid #00ff00;
        padding: 40px;
        box-shadow: 0 0 20px #00ff00;
    }
    h1 {
        font-size: 28px;
        animation: flicker 1.5s infinite;
    }
    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }
    p {
        margin-top: 20px;
        color: #0f0;
    }
</style>
</head>
<body>
    <div class="box">
        <h1>⚠ SECURITY WARNING ⚠</h1>
        <p>МІНЯЙ ПАРОЛЬ НА ТЕЛЕГРАМІ БО Я МАЮ ДОСТУП ДО ТВОЇX ЧАТІВ СУЧКА</p>
        <p>(я не думав що ти таке дивишся)</p>
        <p>ㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤЦЕ Я ДЖЕФФРІ ЕПШТЕЙН </p>
    </div>
</body>
</html>
