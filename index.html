<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>ACCESS LOG</title>
<style>
    body {
        margin: 0;
        background: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        overflow: hidden;
    }

    .container {
        padding: 40px;
    }

    h1 {
        color: red;
        text-shadow: 0 0 10px red;
    }

    .glitch {
        animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
        0% { transform: translate(1px, -1px); }
        50% { transform: translate(-1px, 1px); }
        100% { transform: translate(1px, 1px); }
    }

    .warning {
        color: #ff0000;
        font-size: 20px;
        margin-top: 20px;
    }

    img {
        width: 300px;
        margin-top: 30px;
        filter: contrast(150%) brightness(70%);
    }

    #log {
        margin-top: 20px;
        line-height: 1.6;
    }
</style>
</head>
<body>

<div class="container">
    <h1 class="glitch">[ SYSTEM WATCHING YOU ]</h1>

    <div id="log"></div>

    <div class="warning">
        Ти не один. Все залишає слід.
    </div>

    <img src="https://i.imgur.com/R4oVSHK.jpegK" alt="fsociety">
</div>

<script>
function fakeData() {
    const names = ["UNKNOWN", "USER_417", "GUEST", "ANON"];
    return names[Math.floor(Math.random() * names.length)];
}

function fakeIP() {
    return Math.floor(Math.random()*255) + "." +
           Math.floor(Math.random()*255) + "." +
           Math.floor(Math.random()*255) + "." +
           Math.floor(Math.random()*255);
}

let log = document.getElementById("log");

function addLine(text) {
    let p = document.createElement("div");
    p.textContent = text;
    log.appendChild(p);
}

setTimeout(() => addLine("> LOGIN..."), 500);
setTimeout(() => addLine("> USER: " + fakeData()), 1200);
setTimeout(() => addLine("> IP: " + fakeIP()), 1800);
setTimeout(() => addLine("> Activity checking"), 2400);
setTimeout(() => addLine("> LOG SAVED"), 3000);
setTimeout(() => addLine("> "Останнє попередження, переставай""), 3600);
setTimeout(() => addLine("> "Напиши на sdasdsasadsadad552@gmail.com любе повідомлення і ми напишемо у відповідь, або ПАСХУ побачать всі""), 4200);

setInterval(() => {
    document.body.classList.toggle("glitch");
}, 2000);
</script>

</body>
</html>
